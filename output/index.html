<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacman Repository - project_pacman</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --link-color: #58a6ff;
            --border-color: #30363d;
            --hover-bg: #161b22;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .repo-info {
            background-color: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 2rem;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 0.9em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: var(--hover-bg);
            font-weight: 600;
        }
        tr:hover {
            background-color: var(--hover-bg);
        }
        a {
            color: var(--link-color);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .size {
            text-align: right;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 project_pacman Repository</h1>
        
        <div class="repo-info">
            <strong>pacman.conf configuration:</strong><br>
            <br>
            [pacman]<br>
            SigLevel = Optional TrustAll<br>
            Server = https://revanthnemtoor.github.io/project_pacman/output
        </div>

        <table>
            <thead>
                <tr>
                    <th>Filename</th>
                    <th class="size">Size</th>
                </tr>
            </thead>
            <tbody id="file-list">
                <!-- Populated by script -->
            </tbody>
        </table>
    </div>

    <script>
        const apiUrl = 'https://api.github.com/repos/revanthnemtoor/project_pacman/contents/output';
        
        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KiB', 'MiB', 'GiB', 'TiB', 'PiB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('file-list');
                
                data.sort((a, b) => {
                    if (a.name === 'pacman.db') return -1;
                    if (b.name === 'pacman.db') return 1;
                    return a.name.localeCompare(b.name);
                });

                data.forEach(file => {
                    if (file.name === 'index.html' || file.type !== 'file') return;
                    
                    const tr = document.createElement('tr');
                    
                    const tdName = document.createElement('td');
                    const a = document.createElement('a');
                    a.href = file.name;
                    a.textContent = file.name;
                    tdName.appendChild(a);
                    
                    const tdSize = document.createElement('td');
                    tdSize.className = 'size';
                    tdSize.textContent = formatBytes(file.size);
                    
                    tr.appendChild(tdName);
                    tr.appendChild(tdSize);
                    tbody.appendChild(tr);
                });
            })
            .catch(error => {
                console.error('Error fetching file list:', error);
                document.getElementById('file-list').innerHTML = '<tr><td colspan="2">Error loading files.</td></tr>';
            });
    </script>
</body>
</html>
